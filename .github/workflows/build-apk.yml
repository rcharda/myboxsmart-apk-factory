name: Build APK Revendeur

on:
  workflow_dispatch:
    inputs:
      reseller_id:
        description: 'ID Revendeur (ex: GABO-CWQ2P)'
        required: true
      app_name:
        description: 'Nom de l application'
        required: true
        default: 'My Box Smart'
      pkg_name:
        description: 'Package name (ex: com.gabonsmart.tv)'
        required: true
        default: 'com.myboxsmart.tv'
      version_name:
        description: 'Version (ex: 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🔧 Installer outils
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y apktool aapt2 zipalign
          apktool --version
          echo "✅ APKTool installé"

      - name: 🔧 Installer uber-apk-signer
        run: |
          wget -q "https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar" \
            -O uber-apk-signer.jar
          echo "✅ uber-apk-signer téléchargé"

      - name: 🔑 Restaurer le Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > mybox.jks
          echo "✅ Keystore restauré"

      - name: 📦 Décompiler APK de base (sans ressources)
        run: |
          # -s = skip sources, ne pas décompiler les .dex
          # Sans --use-aapt2 pour éviter le problème de binaire
          apktool d My_Box_Smart_FINAL.apk -o apk_source -s -f
          echo "✅ APK décompilé"
          ls apk_source/

      - name: 📝 Injecter le loader HTML
        run: |
          RESELLER_ID="${{ github.event.inputs.reseller_id }}"
          
          # Trouver le dossier assets
          if [ -d "apk_source/assets" ]; then
            ASSETS_DIR="apk_source/assets"
          else
            mkdir -p apk_source/assets
            ASSETS_DIR="apk_source/assets"
          fi
          
          echo "Assets dir: $ASSETS_DIR"
          ls "$ASSETS_DIR" 2>/dev/null || echo "(vide)"

          cat > "$ASSETS_DIR/index.html" << HTMLEOF
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>${{ github.event.inputs.app_name }}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a1a; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .splash { text-align: center; }
    h1 { font-size: 24px; margin-bottom: 8px; }
    .loading { margin-top: 30px; display: flex; gap: 8px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #e65c00; animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100%{transform:scale(0)} 40%{transform:scale(1)} }
    #app-frame { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    .error-box { display: none; background: #1a1a2e; border: 1px solid #e65c00; border-radius: 12px; padding: 20px; margin-top: 20px; text-align: center; max-width: 300px; }
  </style>
</head>
<body>
  <div class="splash" id="splash">
    <h1>${{ github.event.inputs.app_name }}</h1>
    <div class="loading">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <p style="margin-top:15px;font-size:12px;color:#888;">Chargement en cours...</p>
  </div>
  <div class="error-box" id="error-box">
    <p>Connexion requise</p>
    <p style="font-size:12px;color:#aaa;margin-top:8px;">Verifiez votre connexion internet</p>
  </div>
  <iframe id="app-frame"></iframe>
  <script>
    const RESELLER_ID = '${RESELLER_ID}';
    const SUPABASE_URL = 'https://kathcclodsceifbyygzk.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImthdGhjY2xvZHNjZWlmYnl5Z3prIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDYwMzEyNDUsImV4cCI6MjA2MTYwNzI0NX0.RwBGXs1xrW5E84-JhLrv7GOl9e-g5OxDG6I9GKkRJFY';
    const CACHE_KEY = 'mybox_html_cache_' + RESELLER_ID;

    async function loadApp() {
      try {
        const res = await fetch(SUPABASE_URL + '/rest/v1/app_updates?order=created_at.desc&limit=1', {
          headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        if (!data.length || !data[0].code) throw new Error('Aucune mise a jour');
        let html = data[0].code;
        html = html.replace("const RESELLER_ID = '';", "const RESELLER_ID = '" + RESELLER_ID + "';");
        localStorage.setItem(CACHE_KEY, html);
        launchApp(html);
      } catch(e) {
        const cached = localStorage.getItem(CACHE_KEY);
        if (cached) { launchApp(cached); }
        else {
          document.getElementById('error-box').style.display = 'block';
          document.querySelector('.loading').style.display = 'none';
        }
      }
    }

    function launchApp(html) {
      const frame = document.getElementById('app-frame');
      frame.srcdoc = html;
      frame.style.display = 'block';
      document.getElementById('splash').style.display = 'none';
    }

    loadApp();
  </script>
</body>
</html>
HTMLEOF
          echo "✅ index.html injecté (RESELLER_ID=${RESELLER_ID})"

      - name: 🏷️ Modifier le package dans AndroidManifest
        run: |
          PKG_NAME="${{ github.event.inputs.pkg_name }}"
          VERSION="${{ github.event.inputs.version_name }}"
          
          if [ -f "apk_source/AndroidManifest.xml" ]; then
            sed -i "s/package=\"[^\"]*\"/package=\"${PKG_NAME}\"/" apk_source/AndroidManifest.xml
            echo "✅ Package: ${PKG_NAME}"
          fi
          
          if [ -f "apk_source/apktool.yml" ]; then
            sed -i "s/versionName: .*/versionName: '${VERSION}'/" apk_source/apktool.yml
            echo "✅ Version: ${VERSION}"
          fi

      - name: 🔨 Recompiler l'APK
        run: |
          # --use-aapt2 du système, pas celui embarqué dans l'APK
          apktool b apk_source -o apk_unsigned.apk
          echo "✅ APK recompilé"
          ls -lh apk_unsigned.apk

      - name: ✍️ Signer l'APK
        run: |
          mkdir -p signed
          java -jar uber-apk-signer.jar \
            --apks apk_unsigned.apk \
            --ks mybox.jks \
            --ksAlias mybox \
            --ksKeyPass MYBOX2024 \
            --ksPass MYBOX2024 \
            --out ./signed/
          echo "✅ APK signé"
          ls -lh signed/

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: APK-${{ github.event.inputs.reseller_id }}-v${{ github.event.inputs.version_name }}
          path: signed/*.apk
          retention-days: 30

      - name: ✅ Résumé build
        run: |
          echo "================================"
          echo "✅ BUILD RÉUSSI"
          echo "Revendeur : ${{ github.event.inputs.reseller_id }}"
          echo "App       : ${{ github.event.inputs.app_name }}"
          echo "Package   : ${{ github.event.inputs.pkg_name }}"
          echo "Version   : ${{ github.event.inputs.version_name }}"
          echo "================================"
